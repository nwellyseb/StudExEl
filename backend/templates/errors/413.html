{% extends "base.html" %}

{% block title %}
File Too Large | StudExEl
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow-sm">

                <div class="card-body p-5 text-center">

                    <h1 class="display-4 fw-bold">
                        413
                    </h1>

                    <h2 class="mb-3">
                        Image Is Too Large
                    </h2>

                    <p class="text-muted">
                        The selected file exceeds the 5 MB upload limit.
                        Choose a smaller image and try again.
                    </p>

                    <a
                        href="{{ url_for('listings.sell') }}"
                        class="btn btn-warning">

                        Return to Sell Item

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
