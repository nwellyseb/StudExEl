{% extends "base.html" %}

{% block title %}StudExEl{% endblock %}

{% block content %}

<section class="hero">

    <div class="container">

        <div class="row justify-content-center text-center">

            <div class="col-lg-8">

                <h1 class="display-4 fw-bold mb-4">
                    Buy • Sell • Exchange with Students You Can Trust
                </h1>

                <p class="lead mb-5">
                    Find textbooks, gadgets, uniforms, dorm essentials, and more from verified students across the Philippines.
                </p>

                <div class="input-group input-group-lg mb-3">

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Search books, laptops, calculators...">

                    <button class="btn btn-primary">
                        Search
                    </button>

                </div>

                <div class="mb-4">

                    <select class="form-select form-select-lg">

                        <option selected>
                            📍 Select Your School
                        </option>

                        <option>
                            University of the Philippines Diliman
                        </option>

                        <option>
                            Ateneo de Manila University
                        </option>

                        <option>
                            De La Salle University
                        </option>

                        <option>
                            University of Santo Tomas
                        </option>

                    </select>

                </div>

                <div class="d-flex justify-content-center gap-3">

                    <a href="#" class="btn btn-primary btn-lg">
                        Browse Marketplace
                    </a>

                    <a href="#" class="btn btn-warning btn-lg fw-bold">
                        Sell an Item
                    </a>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
